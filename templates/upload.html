<!DOCTYPE html>
<html>
<head>
  <title>Upload</title>
</head>
<body>

<h2>Upload Multiple Songs</h2>
<a href="/">⬅ Back to Home</a>

<form action="/upload" method="POST" enctype="multipart/form-data">
  <p>Common Image (optional):</p>
  <input type="file" name="image" accept="image/*"><br><br>

  <p>Select Songs (multiple):</p>
  <input type="file" name="songs" multiple accept=".mp3,audio/*" required><br><br>

  <button type="submit">Upload All</button>
</form>

</body>
</html>
