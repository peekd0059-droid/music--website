<!DOCTYPE html>
<html>
<head>
<title>Playlists</title>
</head>
<body>

<h1>Your Playlists</h1>

<form action="/create_playlist" method="POST">
    <input type="text" name="name" placeholder="Playlist name">
    <button>Create</button>
</form>

<ul>
{% for p in playlists %}
    <li>{{ p[2] }} (ID: {{ p[0] }})</li>
{% endfor %}
</ul>

<a href="/">⬅ Back</a>

</body>
</html>
