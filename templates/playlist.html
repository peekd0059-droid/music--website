<!DOCTYPE html>
<html>
<head>
<title>Playlist</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<h2 style="padding:20px">📂 Your Playlists</h2>

<div class="songs">

{% for p in playlists %}
<div class="card">
<h3>{{p[2]}}</h3>

<a href="/playlist/{{p[0]}}" class="btn">Open</a>
</div>
{% endfor %}

</div>

</body>
</html>
