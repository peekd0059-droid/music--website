<!DOCTYPE html>
<html>
<head>
    <title>Melofy</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<h1>Trending Songs</h1>

<!-- Upload (only you use) -->
<form action="/upload" method="post" enctype="multipart/form-data">
    <input type="file" name="song" required>
    <input type="file" name="image" required>
    <button type="submit">Upload</button>
</form>

<hr>

<div class="songs">

    {% for song in songs %}
    <div class="card" onclick="playSong('{{ url_for('static', filename='songs/' + song['file']) }}')">

        <img src="{{ url_for('static', filename='images/' + song['image']) }}" width="150">

        <h3>{{ song['name'] }}</h3>

    </div>
    {% endfor %}

</div>

<br>

<audio id="player" controls style="width: 300px;"></audio>

<script>
function playSong(src){
    let player = document.getElementById("player");
    player.src = src;
    player.play();
}
</script>

</body>
</html>
