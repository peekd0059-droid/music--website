<!DOCTYPE html>
<html>
<head>
    <title>Melofy</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<h1>🎧 Melofy</h1>

<div class="nav">
    <a href="/liked">❤️ Liked Songs</a>
    <a href="/logout">Logout</a>
</div>

<div class="songs">
{% for song in songs %}
    <div class="card">

        <img src="/static/{{ song.img }}">

        <h3>{{ song.name }}</h3>

        <audio controls>
            <source src="/static/{{ song.file }}">
        </audio>

        <a href="/like/{{ song.name }}">❤️ Like</a>

    </div>
{% endfor %}
</div>

</body>
</html>
</html>
