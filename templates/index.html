<!DOCTYPE html>
<html>
<head>
    <title>Melofy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v=40) }}">
</head>

<body>

<div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>🎧 Melofy</h2>
        <a href="/">🏠 Home</a>

        {% if is_admin %}
        <a href="/upload">⬆ Upload</a>
        {% endif %}
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- TOPBAR -->
        <div class="topbar">
            <h3>Discover Music</h3>

            <!-- 🔍 SEARCH BAR -->
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Search songs..." 
                onkeyup="searchSongs()"
            >
        </div>

        <!-- SONG GRID -->
        <div class="songs-container" id="songsContainer">

        {% for song in songs %}
        <div class="card" data-name="{{song['name']}}">

            <img src="{{ url_for('static', filename=song['image']) }}" class="cover">

            <h3>{{song['name']}}</h3>

            <button onclick="playSong({{loop.index0}})">▶ Play</button>

            <br><br>

            <a href="/like/{{song['id']}}" class="like-btn">
                ❤️ {{song['likes']}}
            </a>

        </div>
        {% endfor %}

        </div>

    </div>

</div>

<!-- PLAYER -->
<div class="player">
    <p id="nowPlaying">No song</p>
    <audio id="audioPlayer" controls></audio>
</div>

<script>
// ===== SONG DATA =====
let songs = [
{% for song in songs %}
{
    file: "{{song['file']}}",
    name: "{{song['name']}}"
},
{% endfor %}
];

// ===== PLAY =====
function playSong(index){
    let player = document.getElementById("audioPlayer");
    let title = document.getElementById("nowPlaying");

    player.src = "/static/" + songs[index].file;
    player.play();

    title.innerText = songs[index].name;
}

// ===== SEARCH =====
function searchSongs(){
    let input = document.getElementById("searchInput").value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        let name = card.getAttribute("data-name").toLowerCase();

        if(name.includes(input)){
            card.style.display = "block";
        } else {
            card.style.display = "none";
        }
    });
}
</script>

</body>
</html>
