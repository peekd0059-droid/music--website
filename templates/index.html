<!DOCTYPE html>
<html>
<head>
<title>Melofy</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<!-- LOADER -->
<div id="loader">Loading...</div>

<!-- HEADER -->
<div class="header">
    <h2>🎧 Melofy</h2>

    <form action="/search" class="search">
        <input type="text" name="q" placeholder="Search songs">
    </form>

    <div>
        <a href="/liked" class="btn">❤️</a>
        <a href="/playlist" class="btn">📂</a>
        <a href="/login" class="btn">Login</a>
        <a href="/logout" class="btn">Logout</a>
    </div>
</div>

<!-- CREATE PLAYLIST -->
<div style="padding:20px">
<form action="/create_playlist" method="POST">
<input name="name" placeholder="Create playlist">
<button>Create</button>
</form>
</div>

<!-- SONGS -->
<div class="songs">

{% for song in songs %}
<div class="card">

{% if song[3] %}
<img src="{{ url_for('static', filename=song[3]) }}">
{% endif %}

<h4>{{song[1]}}</h4>

<button onclick="playSong('{{song[2]}}','{{song[1]}}'); this.innerText='Playing...'">
▶ Play
</button>

<br><br>

<a href="/like/{{song[0]}}" class="btn">
{% if liked_ids and song[0] in liked_ids %}
❤️
{% else %}
🤍
{% endif %}
</a>

<br><br>

<form action="/add_to_playlist/{{song[0]}}" method="POST">
<select name="playlist_id">
{% for p in playlists %}
<option value="{{p[0]}}">{{p[2]}}</option>
{% endfor %}
</select>
<button>Add</button>
</form>

</div>
{% endfor %}

</div>

<!-- PLAYER -->
<div class="player">
<p id="title">Select song</p>

<div>
<button onclick="prevSong()">⏮</button>
<button onclick="togglePlay()">⏯</button>
<button onclick="nextSong()">⏭</button>
</div>

<audio id="audio" controls style="width:90%"></audio>
</div>

<script>
window.onload = function(){
document.getElementById("loader").style.display="none";
}

let audio=document.getElementById("audio");
let isPlaying=false;
let songs=[];
let currentIndex=0;

document.querySelectorAll(".card").forEach((card,i)=>{
let file=card.querySelector("button").getAttribute("onclick").split("'")[1];
let title=card.querySelector("h4").innerText;
songs.push({file,title});
});

function playSong(file,title){
audio.src="/static/"+file;
audio.play();
isPlaying=true;
document.getElementById("title").innerText=title;
currentIndex=songs.findIndex(s=>s.file===file);
}

function togglePlay(){
if(!audio.src) return;
if(isPlaying){audio.pause();isPlaying=false;}
else{audio.play();isPlaying=true;}
}

function nextSong(){
currentIndex=(currentIndex+1)%songs.length;
let s=songs[currentIndex];
playSong(s.file,s.title);
}

function prevSong(){
currentIndex=(currentIndex-1+songs.length)%songs.length;
let s=songs[currentIndex];
playSong(s.file,s.title);
}

audio.addEventListener("ended",nextSong);
</script>

</body>
</html>
