<!DOCTYPE html>
<html>
<head>
    <title>Melofy</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v=10) }}">
</head>

<body>

<div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>🎧 Melofy</h2>

        <a href="/">🏠 Home</a>

        {% if is_admin %}
        <a href="/upload">⬆ Upload</a>
        {% endif %}
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">

        <!-- TOP BAR (mobile + desktop) -->
        <div class="topbar">
            <h3>Discover Music</h3>
        </div>

        <!-- SONG GRID -->
        <div class="songs-container">
            {% for song in songs %}
            <div class="card">

                <img src="{{ url_for('static', filename=song['image']) }}" class="cover">

                <h3>{{song['name']}}</h3>

                <button onclick="playSong({{loop.index0}})">▶ Play</button>

            </div>
            {% endfor %}
        </div>

    </div>

</div>

<!-- PLAYER -->
<div class="player">
    <p id="nowPlaying">No song</p>
    <audio id="audioPlayer" controls></audio>
</div>

<script>
let songs = [
{% for song in songs %}
{
    file: "{{song['file']}}",
    name: "{{song['name']}}"
},
{% endfor %}
];

function playSong(index){
    let player = document.getElementById("audioPlayer");
    let title = document.getElementById("nowPlaying");

    player.src = "/static/" + songs[index].file;
    player.play();

    title.innerText = songs[index].name;
}
</script>

</body>
</html>
