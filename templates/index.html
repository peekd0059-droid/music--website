<!DOCTYPE html>
<html>
<head>
    <title>Melofy</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<h1>🎧 Melofy</h1>
<a href="/logout">Logout</a>

<div class="songs">
    {% for song in songs %}
    <div class="card">
        <img src="/static/{{song[3]}}" width="150">
        <h3>{{song[1]}}</h3>
        <audio controls>
            <source src="/static/{{song[2]}}">
        </audio>
    </div>
    {% endfor %}
</div>

</body>
</html>
