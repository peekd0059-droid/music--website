<!DOCTYPE html>
<html>
<head>
    <title>Melofy</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h1>🎧 Melofy</h1>

    <div class="nav-right">
        <form action="/create_playlist" method="POST">
            <input type="text" name="name" placeholder="New Playlist">
            <button>Create</button>
        </form>
    </div>
</div>

<!-- 🎯 MOOD BUTTONS -->
<div class="mood-section">
    <h2>🎯 Choose Mood</h2>
    <a href="/mood?type=happy">😊 Happy</a>
    <a href="/mood?type=sad">😢 Sad</a>
    <a href="/mood?type=chill">🌙 Chill</a>
    <a href="/mood?type=energy">⚡ Energy</a>
</div>

<!-- PLAYLIST -->
<div style="padding:20px;">
<h2>📂 Playlists</h2>

{% for p in playlists %}
    <a href="/playlist/{{p['id']}}">{{p['name']}}</a><br>
{% endfor %}

</div>

<hr>

<!-- SONGS -->
<div class="songs-container">

{% for song in songs %}

<div class="card">

    <img src="/{{ song['image'] }}" class="cover">

    <h3>{{ song['name'] }}</h3>

    <button onclick="playSong({{loop.index0}})" class="play-btn">
        ▶ Play
    </button>

    <form action="/add_to_playlist/{{song['id']}}" method="POST">
        <select name="playlist_id">
            {% for p in playlists %}
                <option value="{{p['id']}}">{{p['name']}}</option>
            {% endfor %}
        </select>
        <button>Add</button>
    </form>

</div>

{% endfor %}

</div>

<!-- PLAYER -->
<div class="player">
    <p id="nowPlaying">No song</p>
    <audio id="audioPlayer" controls></audio>
</div>

<script>

let songs = [
{% for song in songs %}
{
    file: "{{song['file']}}",
    name: "{{song['name']}}"
},
{% endfor %}
];

function playSong(index){
    let player = document.getElementById("audioPlayer");
    let title = document.getElementById("nowPlaying");

    player.src = "/" + songs[index].file;
    player.play();

    title.innerText = songs[index].name;
}

</script>

</body>
</html>
