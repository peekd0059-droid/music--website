<!DOCTYPE html>
<html>
<head>
    <title>Bulk Upload</title>
</head>
<body>

<h2>🎵 Upload Multiple Songs</h2>

<form action="/upload" method="POST" enctype="multipart/form-data">

    <label>Common Image:</label><br>
    <input type="file" name="image" required><br><br>

    <label>Select Songs:</label><br>
    <input type="file" name="songs" multiple required><br><br>

    <button>Upload All</button>

</form>

</body>
</html>
