<!DOCTYPE html>
<html>
<head>
    <title>Melofy</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="navbar">
    <h1>🎧 Melofy</h1>

    <div class="nav-right">
<a href="/trending">🔥 Trending</a>
<a href="/recommend">🤖 For You</a>
  <a href="/logout">Logout</a>

        <form action="/search" class="search-box">
            <input type="text" name="q" placeholder="Search songs">
            <button>Search</button>
        </form>

        <a href="/upload">Upload Song</a>
    </div>
</div>

<div class="songs-container">

{% for song in songs %}

<div class="card">

    <img src="/{{ song['image'] }}" class="cover">

    <h3>{{ song['name'] }}</h3>

    <button onclick="playSong('{{song['file']}}','{{song['name']}}')" class="play-btn">
        ▶ Play
    </button>

    <a href="/like/{{song['id']}}">❤️ Like</a>

</div>

{% endfor %}

</div>

<!-- 🎧 PLAYER -->
<div class="player">
    <p id="nowPlaying">No song selected</p>

    <audio id="audioPlayer" controls></audio>
</div>

<script>
function playSong(file, name){
    let player = document.getElementById("audioPlayer");
    let title = document.getElementById("nowPlaying");

    player.src = "/" + file;
    player.play();

    title.innerText = name;
}
</script>

</body>
</html>
