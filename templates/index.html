<!DOCTYPE html>
<html>
<head>
<title>Melofy</title>
</head>

<body>

<h2>🎧 Melofy</h2>

<!-- 🔍 SEARCH -->
<form action="/search">
<input type="text" name="q" placeholder="Search songs">
<button>Search</button>
</form>

<!-- ❤️ LIKED -->
<a href="/liked">❤️ Liked Songs</a>

<!-- 📂 PLAYLIST -->
<form action="/create_playlist" method="POST">
<input name="name" placeholder="Playlist name">
<button>Create Playlist</button>
</form>

<hr>

{% for song in songs %}
<div>

<h3>{{song[1]}}</h3>

<audio controls>
<source src="/static/{{song[2]}}">
</audio>

<br>

<a href="/like/{{song[0]}}">❤️ Like</a>

</div>
<hr>
{% endfor %}

</body>
</html>
