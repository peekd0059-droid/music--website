<!DOCTYPE html>
<html>
<head>
<title>Melofy</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<h1>🎧 Melofy</h1>

<input type="text" id="search" placeholder="Search song..." onkeyup="searchSong()">

<a href="/playlists">📂 Playlists</a>
<a href="/logout">Logout</a>

<div class="songs" id="songs">
{% for song in songs %}
<div class="card">
    <h3>{{ song.name }}</h3>

    <button onclick="playSong('{{ song.file }}')">▶</button>

    <form action="/add_to_playlist" method="POST">
        <input type="hidden" name="song" value="{{ song.name }}">
        <input type="number" name="pid" placeholder="Playlist ID">
        <button>Add</button>
    </form>
</div>
{% endfor %}
</div>

<audio id="player" controls></audio>

<script>
function playSong(file){
    let player = document.getElementById("player");
    player.src = "/static/" + file;
    player.play();
}

function searchSong(){
    let input = document.getElementById("search").value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(c=>{
        let text = c.innerText.toLowerCase();
        c.style.display = text.includes(input) ? "block" : "none";
    });
}
</script>

</body>
</html>
