<!DOCTYPE html>
<html>
<head>
    <title>Melofy</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        body{
            background:#121212;
            color:white;
            font-family: Arial;
        }

        .songs{
            display:flex;
            gap:20px;
            flex-wrap:wrap;
        }

        .card{
            background:#181818;
            padding:15px;
            border-radius:10px;
            width:180px;
            text-align:center;
            transition:0.3s;
        }

        .card:hover{
            background:#282828;
            transform:scale(1.05);
        }

        .card img{
            width:100%;
            border-radius:10px;
        }

        button{
            background:#1db954;
            border:none;
            padding:8px 12px;
            color:white;
            border-radius:20px;
            cursor:pointer;
        }

        button:hover{
            background:#1ed760;
        }
    </style>
</head>

<body>

<h1>Trending Songs</h1>

<!-- Upload hidden feel -->
<form action="/upload" method="post" enctype="multipart/form-data">
    <input type="file" name="song" required>
    <input type="file" name="image" required>
    <button type="submit">Upload</button>
</form>

<hr>

<div class="songs">

    {% for song in songs %}
    <div class="card">

        <img src="{{ url_for('static', filename='images/' + song['image']) }}">

        <h3>{{ song['name'] }}</h3>

        <button onclick="playSong({{ loop.index0 }})">▶ Play</button>

    </div>
    {% endfor %}

</div>

<br><br>

<!-- PLAYER -->
<h3 id="nowPlaying">No song playing</h3>

<audio id="player" controls style="width:300px;"></audio>

<br><br>

<button onclick="prevSong()">⏮ Prev</button>
<button onclick="nextSong()">⏭ Next</button>

<script>
let songs = [];
let names = [];
let currentIndex = 0;

{% for song in songs %}
songs.push("{{ url_for('static', filename='songs/' + song['file']) }}");
names.push("{{ song['name'] }}");
{% endfor %}

let player = document.getElementById("player");
let nowPlaying = document.getElementById("nowPlaying");

function playSong(index){
    currentIndex = index;
    player.src = songs[index];
    player.play();
    nowPlaying.innerText = "Now Playing: " + names[index];
}

function nextSong(){
    currentIndex = (currentIndex + 1) % songs.length;
    playSong(currentIndex);
}

function prevSong(){
    currentIndex = (currentIndex - 1 + songs.length) % songs.length;
    playSong(currentIndex);
}

player.onended = function(){
    nextSong();
}
</script>

</body>
</html>
