<!DOCTYPE html>
<html>
<head>
<title>Melofy</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<!-- LOADER -->
<div id="loader">Loading...</div>

<!-- HEADER -->
<div class="header">
    <h2>🎧 Melofy</h2>

    <form action="/search" class="search">
        <input type="text" name="q" placeholder="Search songs">
    </form>

    <div>
        <a href="/login" class="btn">Login</a>
        <a href="/logout" class="btn">Logout</a>
    </div>
</div>

<!-- SONGS -->
<div class="songs">

{% for song in songs %}
<div class="card">

{% if song[3] %}
<img src="{{song[3]}}">
{% endif %}

<h4>{{song[1]}}</h4>

<button onclick="playSong('{{song[2]}}','{{song[1]}}'); this.innerText='Playing...'">
▶ Play
</button>

</div>
{% endfor %}

</div>

<!-- PLAYER -->
<div class="player">
<p id="title">Select song</p>

<div>
<button onclick="prevSong()">⏮</button>
<button onclick="togglePlay()">⏯</button>
<button onclick="nextSong()">⏭</button>
</div>

<audio id="audio" controls style="width:90%"></audio>
</div>

<script>
window.onload = function(){
document.getElementById("loader").style.display="none";
}

let audio=document.getElementById("audio");
let isPlaying=false;
let songs=[];
let currentIndex=0;

// IMPORTANT: cloud URL use
document.querySelectorAll(".card").forEach((card,i)=>{
let file=card.querySelector("button").getAttribute("onclick").split("'")[1];
let title=card.querySelector("h4").innerText;
songs.push({file,title});
});

function playSong(file,title){
audio.src=file;   // 🔥 cloud fix
audio.play();
isPlaying=true;
document.getElementById("title").innerText=title;
currentIndex=songs.findIndex(s=>s.file===file);
}

function togglePlay(){
if(!audio.src) return;
if(isPlaying){audio.pause();isPlaying=false;}
else{audio.play();isPlaying=true;}
}

function nextSong(){
currentIndex=(currentIndex+1)%songs.length;
let s=songs[currentIndex];
playSong(s.file,s.title);
}

function prevSong(){
currentIndex=(currentIndex-1+songs.length)%songs.length;
let s=songs[currentIndex];
playSong(s.file,s.title);
}

audio.addEventListener("ended",nextSong);
</script>

</body>
</html>
