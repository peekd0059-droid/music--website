<!DOCTYPE html>
<html>
<head>
    <title>Melofy</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<h1>🎧 Melofy</h1>

<a href="/liked">❤️ Liked Songs</a> |
<a href="/logout">Logout</a>

<div class="songs">

{% for song in songs %}
<div class="card">

    <img src="/static/{{ song.img }}" width="150">

    <h3>{{ song.name }}</h3>

    <audio controls>
        <source src="/static/{{ song.file }}">
    </audio>

    <br>

    <a href="/like/{{ song.name }}">❤️ Like</a>

</div>
{% endfor %}

</div>

</body>
</html>
