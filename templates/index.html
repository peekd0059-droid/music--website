<!DOCTYPE html>
<html>
<head>
    <title>Melofy</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<h1>🎧 Melofy</h1>
<a href="/logout">Logout</a>

<div class="songs">
{% for song in songs %}
<div class="card">

    <img src="/static/{{ song.img }}">

    <h3>{{ song.name }}</h3>

    <button onclick="playSong('{{ song.file }}')">▶ Play</button>

</div>
{% endfor %}
</div>

<!-- SINGLE PLAYER -->
<div class="player">
    <audio id="player" controls></audio>
</div>

<script>
function playSong(file){
    let player = document.getElementById("player");
    player.src = "/static/" + file;
    player.play();
}
</script>

</body>
</html>
