<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Melofy</title>

  <!-- SAME UI CSS (unchanged) -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body{background:#0a0a0f;color:white;font-family:'DM Sans'}
    .songs-grid{display:flex;gap:20px;flex-wrap:wrap}
    .song-card{background:#111;padding:15px;border-radius:10px;width:180px;cursor:pointer}
    .song-art img{width:100%;height:150px;object-fit:cover}
    .song-name{font-size:14px;margin-top:10px}
  </style>
</head>

<body>

<h2>🎧 Melofy</h2>

<div class="songs-grid">

{% for song in songs %}
<div class="song-card"
     onclick="playSong('{{ song[2] }}','{{ song[1] }}','{{ song[3] }}')">

    <div class="song-art">

        {% if song[3] %}
        <!-- ✅ IMAGE FIX -->
        <img src="{{ url_for('static', filename=song[3]) }}">
        {% else %}
        <div>🎵</div>
        {% endif %}

    </div>

    <div class="song-name">{{ song[1] }}</div>

</div>
{% endfor %}

</div>

<!-- PLAYER -->
<div style="position:fixed;bottom:0;width:100%;background:#111;padding:10px">
    <p id="title">Select Song</p>
    <audio id="audio" controls style="width:100%"></audio>
</div>

<script>

let audio = document.getElementById("audio");

function playSong(file, title, img){

    // ✅ FIXED PATH
    audio.src = "/static/" + file;
    audio.play();

    document.getElementById("title").innerText = title;
}

</script>

</body>
</html>
