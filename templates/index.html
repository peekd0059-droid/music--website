<!DOCTYPE html>
<html>
<head>
    <title>Melofy</title>

    <style>
        body{
            background:#121212;
            color:white;
            font-family: Arial, sans-serif;
        }

        h1{
            margin-left:20px;
        }

        .songs{
            display:flex;
            flex-wrap:wrap;
            gap:20px;
            padding:20px;
        }

        .card{
            background:#181818;
            padding:15px;
            border-radius:12px;
            width:180px;
            text-align:center;
            transition:0.3s;
        }

        .card:hover{
            background:#282828;
            transform:scale(1.05);
        }

        .card img{
            width:100%;
            border-radius:10px;
        }

        button{
            background:#1db954;
            border:none;
            padding:8px 12px;
            color:white;
            border-radius:20px;
            cursor:pointer;
            margin-top:8px;
        }

        button:hover{
            background:#1ed760;
        }

        #player{
            margin-left:20px;
        }

        #controls{
            margin-left:20px;
        }
    </style>
</head>

<body>

<h1>Melofy</h1>

<div class="songs">

    {% for song in songs %}
    <div class="card">

        <img src="{{ url_for('static', filename='images/' + song['image']) }}">

        <h3>{{ song['name'] }}</h3>

        <button onclick="playSong({{ loop.index0 }})">▶ Play</button>

    </div>
    {% endfor %}

</div>

<br>

<h3 id="nowPlaying" style="margin-left:20px;">No song playing</h3>

<audio id="player" controls style="width:300px;"></audio>

<br><br>

<div id="controls">
    <button onclick="prevSong()">⏮ Prev</button>
    <button onclick="nextSong()">⏭ Next</button>
</div>

<script>
let songs = [];
let names = [];
let currentIndex = 0;

{% for song in songs %}
songs.push("{{ url_for('static', filename='songs/' + song['file']) }}");
names.push("{{ song['name'] }}");
{% endfor %}

let player = document.getElementById("player");
let nowPlaying = document.getElementById("nowPlaying");

function playSong(index){
    currentIndex = index;
    player.src = songs[index];
    player.play();
    nowPlaying.innerText = "Now Playing: " + names[index];
}

function nextSong(){
    currentIndex = (currentIndex + 1) % songs.length;
    playSong(currentIndex);
}

function prevSong(){
    currentIndex = (currentIndex - 1 + songs.length) % songs.length;
    playSong(currentIndex);
}

player.onended = function(){
    nextSong();
}
</script>

</body>
</html>
