<!DOCTYPE html>
<html>
<head>
    <title>Melofy</title>

    <style>
        body{
            margin:0;
            background:#121212;
            color:white;
            font-family: Arial;
            display:flex;
        }

        .sidebar{
            width:200px;
            background:#000;
            height:100vh;
            padding:20px;
        }

        .sidebar h2{
            color:#1db954;
        }

        .sidebar p{
            margin:15px 0;
            cursor:pointer;
            color:#b3b3b3;
        }

        .sidebar p:hover{
            color:white;
        }

        .main{
            flex:1;
            padding:20px;
        }

        input{
            padding:8px;
            border-radius:5px;
            border:none;
            width:200px;
        }

        button{
            background:#1db954;
            border:none;
            padding:8px 12px;
            color:white;
            border-radius:20px;
            cursor:pointer;
            margin-top:5px;
        }

        .songs{
            display:flex;
            flex-wrap:wrap;
            gap:20px;
            margin-top:20px;
        }

        .card{
            background:#181818;
            padding:15px;
            border-radius:10px;
            width:180px;
            text-align:center;
            transition:0.3s;
        }

        .card:hover{
            background:#282828;
            transform:scale(1.05);
        }

        .card img{
            width:100%;
            border-radius:10px;
        }

        .player{
            position:fixed;
            bottom:0;
            left:200px;
            right:0;
            background:#181818;
            padding:10px;
        }
    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>Melofy</h2>
    <p>Home</p>
    <p>Search</p>
    <p onclick="window.location.href='/liked'">❤️ Liked Songs</p>
</div>

<!-- Main -->
<div class="main">

    <h1>Melofy</h1>

    <!-- Search -->
    <input type="text" id="searchInput" placeholder="Search song..." onkeyup="searchSongs()">
    <button onclick="searchSongs()">Search</button>

    <!-- Songs -->
    <div class="songs">

        {% for song in songs %}
        <div class="card">

            <img src="{{ url_for('static', filename='images/' + song['image']) }}">

            <h3>{{ song['name'] }}</h3>

            <button onclick="playSong({{ loop.index0 }})">▶ Play</button>

            <!-- ❤️ Like Button -->
            <button 
            onclick="likeSong(this,'{{ song['name'] }}','{{ song['file'] }}','{{ song['image'] }}')" 
            style="background:none; border:none; font-size:18px;">
            ❤️
            </button>

        </div>
        {% endfor %}

    </div>

</div>

<!-- Player -->
<div class="player">

    <h3 id="nowPlaying">No song playing</h3>

    <button onclick="prevSong()">⏮</button>
    <button onclick="togglePlay()">⏯</button>
    <button onclick="nextSong()">⏭</button>

    <br><br>

    <audio id="player" controls style="width:300px;"></audio>

</div>

<script>

let songs = [];
let names = [];
let currentIndex = 0;

{% for song in songs %}
songs.push("{{ url_for('static', filename='songs/' + song['file']) }}");
names.push("{{ song['name'] }}");
{% endfor %}

let player = document.getElementById("player");
let nowPlaying = document.getElementById("nowPlaying");

// Play
function playSong(index){
    currentIndex = index;

    if(player.src !== songs[index]){
        player.src = songs[index];
    }

    player.play();
    nowPlaying.innerText = "Now Playing: " + names[index];
}

// Toggle
function togglePlay(){
    if(player.paused){
        player.play();
    } else {
        player.pause();
    }
}

// Next
function nextSong(){
    currentIndex = (currentIndex + 1) % songs.length;
    player.src = songs[currentIndex];
    player.play();
    nowPlaying.innerText = "Now Playing: " + names[currentIndex];
}

// Prev
function prevSong(){
    currentIndex = (currentIndex - 1 + songs.length) % songs.length;
    player.src = songs[currentIndex];
    player.play();
    nowPlaying.innerText = "Now Playing: " + names[currentIndex];
}

// Auto next
player.onended = function(){
    nextSong();
}

// Search
function searchSongs(){
    let input = document.getElementById("searchInput").value.toLowerCase();
    let cards = document.getElementsByClassName("card");

    for(let i=0;i<cards.length;i++){
        let text = cards[i].innerText.toLowerCase();

        if(text.includes(input)){
            cards[i].style.display="block";
        }else{
            cards[i].style.display="none";
        }
    }
}

// ❤️ Like + Color change
function likeSong(btn, name, file, image){

    fetch("/like", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name: name,
            file: file,
            image: image
        })
    }).then(() => {

        btn.style.color = "#1db954";
        btn.innerText = "💚";

    });
}

</script>

</body>
</html>
