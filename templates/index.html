<!DOCTYPE html>
<html>
<head>
    <title>Melofy</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<h1>🎧 Melofy</h1>

<a href="/logout">Logout</a>

<br><br>

<form action="/search">
    <input type="text" name="q" placeholder="Search songs">
    <button>Search</button>
</form>

<br>

<a href="/upload">Upload Song</a>

<hr>

<div style="display:flex;gap:20px;flex-wrap:wrap;">

{% for song in songs %}

<div style="background:#111;padding:20px;border-radius:10px;width:200px">

    <img src="{{ song['image'] }}" width="150">

    <h3>{{ song['name'] }}</h3>

    <audio controls>
        <source src="{{ song['file'] }}">
    </audio>

    <br>

    <a href="/play/{{song['id']}}">▶ Play</a>

    <br><br>

    {% if song['id'] in liked_ids %}
        <a href="/like/{{song['id']}}">❤️ Liked</a>
    {% else %}
        <a href="/like/{{song['id']}}">🤍 Like</a>
    {% endif %}

</div>

{% endfor %}

</div>

</body>
</html>
