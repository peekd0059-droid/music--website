<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body style="display:flex;justify-content:center;align-items:center;height:100vh;">

<form method="POST" style="background:#111;padding:30px;border-radius:10px">

<h2>Login</h2>

<input name="username" placeholder="Username" style="display:block;margin:10px 0;padding:10px;width:200px">
<input type="password" name="password" placeholder="Password" style="display:block;margin:10px 0;padding:10px;width:200px">

<button>Login</button>

<br><br>

<a href="/signup" style="color:#1db954">Create Account</a>

</form>

</body>
</html>
